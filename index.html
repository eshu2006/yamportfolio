<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medical Portfolio Landing</title>
    <link rel="stylesheet" href="landing.css" />
  </head>
  <body>
    <div class="surface">
      <div class="background"></div>
      <div class="hero">
        <div class="intro-text">
          <span class="eyebrow">Welcome</span>
          <h1>Click the capsule to enter my medical portfolio</h1>
        </div>
        <div class="capsule-wrap">
          <button class="capsule" id="capsule" aria-label="Open capsule">
            <div class="capsule-half left">
              <div class="capsule-light"></div>
            </div>
            <div class="capsule-half right">
              <div class="capsule-light"></div>
            </div>
            <div class="glow-ring"></div>
          </button>
        </div>
        <noscript>
          <div class="no-js-link">
            <a href="/portfolio/index.html" class="button">Enter Portfolio</a>
          </div>
        </noscript>
      </div>
    </div>

    <script src="landing.js"></script>
  </body>
</html>
